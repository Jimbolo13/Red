<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jeu de Réaction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
        }

        #gameBox {
            width: 300px;
            height: 300px;
            margin: 50px auto;
            background-color: grey;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 10px;
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #result, #best, #history {
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>⚡ Jeu de Réaction</h1>
    <button onclick="startGame()">Start</button>

    <div id="gameBox">Clique ici</div>

    <div id="result"></div>
    <div id="best"></div>
    <div id="history"></div>

    <script>
        let startTime;
        let timeout;
        let canClick = false;
        let history = [];

        const box = document.getElementById("gameBox");
        const result = document.getElementById("result");
        const bestDisplay = document.getElementById("best");
        const historyDisplay = document.getElementById("history");

        // Charger le meilleur score
        let bestScore = localStorage.getItem("bestScore");
        if (bestScore) {
            bestDisplay.textContent = "🏆 Meilleur score : " + bestScore + " ms";
        }

        function startGame() {
            result.textContent = "";
            box.style.backgroundColor = "red";
            box.textContent = "Attends...";

            canClick = false;

            const delay = Math.random() * 3000 + 2000;

            timeout = setTimeout(() => {
                box.style.backgroundColor = "green";
                box.textContent = "CLIQUE !";
                startTime = Date.now();
                canClick = true;
            }, delay);
        }

        box.addEventListener("click", () => {
            if (!canClick) {
                clearTimeout(timeout);
                box.style.backgroundColor = "grey";
                box.textContent = "Trop tôt ! 😅";
                result.textContent = "Tu as cliqué trop tôt !";
                return;
            }

            const reactionTime = Date.now() - startTime;

            // Affichage résultat
            result.textContent = "⏱ Temps : " + reactionTime + " ms";

            // Historique
            history.push(reactionTime);
            historyDisplay.textContent = "Historique : " + history.join(" ms | ") + " ms";

            // Meilleur score
            if (!bestScore || reactionTime < bestScore) {
                bestScore = reactionTime;
                localStorage.setItem("bestScore", bestScore);
                bestDisplay.textContent = "🏆 Nouveau record : " + bestScore + " ms 🎉";
            } else {
                bestDisplay.textContent = "🏆 Meilleur score : " + bestScore + " ms";
            }

            box.style.backgroundColor = "grey";
            box.textContent = "Rejouer ?";
            canClick = false;
        });
    </script>

</body>
</html>
